<!DOCTYPE html>
<html lang="zh-CN">
<!-- 操作员查看页面 - 显示所有歌曲记录供操作员查看 -->
<head>
    <!-- 页面元信息 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="utf-8">
    <title>歌单预览</title>

    <!-- 外部样式表 -->
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>
    <!-- 页面主要内容容器 -->
    <div class="container">
        <!-- 页面标题 -->
        <h2>歌单预览</h2>

        <!-- 歌曲查看模块 -->
        <h3>歌曲查看</h3>
        <table>
            <thead>
                <tr>
                    <th>班级</th>
                    <th>姓名</th>
                    <th>歌曲</th>
                    <th>作者</th>
                    <th>播放时段</th>
                    <th>提交时间</th>
                    <th>状态</th>  <!-- 审核状态 -->
                </tr>
            </thead>
            <tbody>
                <!-- 循环显示所有歌曲记录 -->
                {% for r in responses %}
                <tr>
                    <td>{{ r.class_name }}</td>
                    <td>{{ r.name }}</td>
                    <td>{{ r.song }}</td>
                    <td>{{ r.author }}</td>
                    <td>{{ r.timeslot }}</td>
                    <td>{{ r.created_at.strftime("%Y-%m-%d %H:%M:%S") }}</td>
                    <td>{{ r.status }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

        <hr>

        <!-- 退出登录按钮 -->
        <div style="text-align:right; margin-bottom:10px;">
            <a href="/logout">
                <button class="btn btn-ghost">退出登录</button>
            </a>
        </div>

        <!-- 页脚信息 -->
        <div class="footer">
            <span>powered by</span>
            <img src="/static/logo.png" style="height:1em; vertical-align:middle;" alt="Logo">
        </div>
    </div>
</body>
</html>
