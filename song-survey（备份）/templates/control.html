<!DOCTYPE html>
<html lang="zh-CN">
<!-- 审核员控制台页面 - 用于审核员审核和管理歌曲提交 -->
<head>
    <!-- 页面元信息 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="utf-8">
    <title>审核员控制台</title>

    <!-- 外部样式表 -->
    <link rel="stylesheet" href="/static/style.css">

    <!-- 内联样式 -->
    <style>
        /* ===== 底部导航栏样式 ===== */
        .topbar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #cbe5ff;
            display: flex;
            justify-content: space-around; /* 平均分布 */
            align-items: center;
            padding: 6px 0;
            z-index: 100;
            border-top: 1px solid #ddd;
        }

        .nav-link {
            flex: 1; /* 每个按钮等宽 */
            text-align: center;
            text-decoration: none;
            color: #000;
            font-size: 12px;
            padding: 6px 0;
            border-radius: 4px;
        }

        .nav-link.active {
            background: #7eccff;
            font-weight: 600;
        }

        .nav-link.danger {
            background: #e74c3c;
            color: #fff;
        }

        /* ===== 页面容器样式 ===== */
        .container {
            max-width: 1200px;
            margin: 20px auto;
            padding-bottom: 70px; /* 防止底部导航遮挡内容 */
        }

        /* ===== 表格样式 ===== */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 6px 8px;
            text-align: center;
        }

        th {
            background: #f5f5f5;
        }

        th[onclick] {
            cursor: pointer;
        }

        /* ===== 弹窗样式 ===== */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .popup {
            background: #fff;
            padding: 20px 24px;
            border-radius: 10px;
            width: 300px;
            text-align: center;
        }

        .popup-buttons {
            margin-top: 12px;
            display: flex;
            justify-content: space-between;
        }

        .popup button {
            padding: 6px 12px;
            border-radius: 4px;
            border: none;
            cursor: pointer;
        }

        .popup button.secondary {
            background: #ccc;
        }

        /* ===== 链接和图标样式 ===== */
        .action-link {
            color: #007bff;
            text-decoration: none;
            cursor: pointer;
        }

        .action-link:hover {
            text-decoration: underline;
        }

        .eye-icon {
            cursor: pointer;
            margin-left: 4px;
        }

        /* ===== 表格内输入框样式 ===== */
        td input, td select {
            width: 80px;
            padding: 4px;
            font-size: 13px;
        }

        /* ===== 响应式设计 ===== */
        @media (max-width: 500px) {
            .nav-link {
                font-size: 10px;
                padding: 6px 2px;
            }
        }
    </style>
</head>

<body>
    <!-- 页面主要内容容器 -->
    <div class="container">
        <h2>审核员控制台</h2>

        <!-- 歌曲管理模块 -->
        <div id="songs" class="section">
            <h3>歌曲管理</h3>

            <!-- 批量操作按钮 -->
            <div style="margin-bottom:10px; display:flex; gap:12px; flex-wrap:wrap;">
                <button class="btn btn-success" onclick="batchUpdate('审核通过')">批量通过</button>
                <button class="btn btn-danger" onclick="batchUpdate('审核驳回')">批量驳回</button>
                <button class="btn btn-secondary" onclick="resetTable()">恢复默认排序</button>
            </div>

            <!-- 歌曲列表表格 -->
            <table>
                <thead>
                    <tr>
                        <th><input type="checkbox" onclick="toggleAll(this)"></th>
                        <th onclick="sortTable(1)">班级</th>
                        <th onclick="sortTable(2)">姓名</th>
                        <th onclick="sortTable(3)">歌曲</th>
                        <th onclick="sortTable(4)">作者</th>
                        <th onclick="sortTable(5)">播放时段</th>
                        <th onclick="sortTable(6)">提交时间</th>
                        <th>状态</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- 循环显示歌曲记录 -->
                    {% for r in responses %}
                    <tr>
                        <td class="check-cell">
                            <span class="warn-icon" style="display:none; color:red; margin-right:4px;">⚠️</span>
                            <input type="checkbox" class="row-check" value="{{ r.id }}">
                        </td>
                        <td>{{ r.class_name }}</td>
                        <td>{{ r.name }}</td>
                        <td>{{ r.song }}</td>
                        <td>{{ r.author }}</td>
                        <td>{{ r.timeslot }}</td>
                        <td>{{ r.created_at.strftime("%Y-%m-%d %H:%M:%S") }}</td>
                        <td>
                            <select onchange="updateStatus('{{ r.id }}', this.value)">
                                <option value="未审核" {% if r.status == '未审核' %}selected{% endif %}>未审核</option>
                                <option value="审核通过" {% if r.status == '审核通过' %}selected{% endif %}>审核通过</option>
                                <option value="审核驳回" {% if r.status == '审核驳回' %}selected{% endif %}>审核驳回</option>
                            </select>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>

        <hr>

        <!-- 退出登录按钮 -->
        <div style="text-align:right; margin-bottom:10px;">
            <a href="/logout">
                <button class="btn btn-ghost">退出登录</button>
            </a>
        </div>

        <hr>

        <!-- 页脚信息 -->
        <div class="footer">
            <span>powered by</span>
            <img src="/static/logo.png" alt="Logo">
        </div>
    </div>

    <!-- JavaScript 功能脚本 -->
    <script>
        /* ===== 歌曲状态更新功能 ===== */
        function updateStatus(id, status) {
            // 保存当前滚动位置
            const scrollY = window.scrollY;

            // 发送 AJAX 请求更新状态
            fetch("/update_status/" + id, {
                method: "POST",
                body: new URLSearchParams({ status: status })
            })
            .then(() => {
                // 恢复滚动位置
                window.scrollTo(0, scrollY);
            })
            .catch(err => alert("操作失败"));
        }

        /* ===== 表格全选功能 ===== */
        function toggleAll(source) {
            // 获取所有行复选框并设置选中状态
            document.querySelectorAll(".row-check").forEach(cb => {
                cb.checked = source.checked;
            });
        }

        /* ===== 获取选中行ID ===== */
        function getSelectedIds() {
            // 返回所有选中行的 ID 数组
            return Array.from(document.querySelectorAll(".row-check:checked"))
                .map(cb => cb.value);
        }

        /* ===== 批量状态更新 ===== */
        function batchUpdate(status) {
            const ids = getSelectedIds();

            if (ids.length === 0) {
                alert("请先选择歌曲");
                return;
            }

            if (!confirm("确定批量修改状态？")) return;

            // 为每个选中 ID 发送更新请求
            const requests = ids.map(id => {
                return fetch("/update_status/" + id, {
                    method: "POST",
                    body: new URLSearchParams({ status: status })
                });
            });

            // 等待所有请求完成
            Promise.all(requests)
            .then(() => {
                location.reload(); // 刷新页面以显示更新结果
            })
            .catch(() => alert("批量操作失败"));
        }

        /* ===== 表格排序功能 ===== */
        let sortDirection = {};

        function sortTable(colIndex) {
            const table = document.querySelector("table");
            const headers = table.querySelectorAll("th");

            // 清除所有排序箭头
            headers.forEach((th, index) => {
                if (index === 0) return;

                // 只处理文本节点，避免影响子元素
                th.childNodes.forEach(node => {
                    if (node.nodeType === 3) { // 文本节点
                        node.textContent = node.textContent.replace(/[↑↓]/g, "");
                    }
                });
            });

            // 切换排序方向
            sortDirection[colIndex] = !sortDirection[colIndex];

            // 添加排序箭头
            headers[colIndex].innerText += sortDirection[colIndex] ? " ↑" : " ↓";

            // 获取表格行并排序
            const rows = Array.from(table.rows).slice(1);

            rows.sort((a, b) => {
                const aText = a.children[colIndex].innerText.trim();
                const bText = b.children[colIndex].innerText.trim();

                return sortDirection[colIndex]
                    ? aText.localeCompare(bText, 'zh')
                    : bText.localeCompare(aText, 'zh');
            });

            // 重新添加排序后的行
            rows.forEach(row => table.appendChild(row));
        }

        /* ===== 表格筛选功能 ===== */
        function initFilters() {
            const rows = document.querySelectorAll("table tr");

            const classSet = new Set();
            const nameSet = new Set();
            const songSet = new Set();

            // 收集所有唯一值
            rows.forEach((row, index) => {
                if (index === 0) return;

                classSet.add(row.children[1].innerText.trim());
                nameSet.add(row.children[2].innerText.trim());
                songSet.add(row.children[3].innerText.trim());
            });

            // 填充筛选下拉框
            fillSelect("filter-class", classSet);
            fillSelect("filter-name", nameSet);
            fillSelect("filter-song", songSet);
        }

        function fillSelect(id, dataSet) {
            const select = document.getElementById(id);

            dataSet.forEach(val => {
                const option = document.createElement("option");
                option.value = val;
                option.textContent = val;
                select.appendChild(option);
            });
        }

        function filterTable() {
            const classVal = document.getElementById("filter-class").value;
            const nameVal = document.getElementById("filter-name").value;
            const songVal = document.getElementById("filter-song").value;

            const rows = document.querySelectorAll("table tr");

            // 显示/隐藏匹配的行
            rows.forEach((row, index) => {
                if (index === 0) return;

                const classText = row.children[1].innerText.trim();
                const nameText = row.children[2].innerText.trim();
                const songText = row.children[3].innerText.trim();

                const match =
                    (classVal === "" || classText === classVal) &&
                    (nameVal === "" || nameText === nameVal) &&
                    (songVal === "" || songText === songVal);

                row.style.display = match ? "" : "none";
            });
        }

        /* ===== 重复记录检测 ===== */
        function detectDuplicates() {
            const rows = document.querySelectorAll("table tr");

            const map = {};

            // 按班级和姓名分组
            rows.forEach((row, i) => {
                if (i === 0) return;

                const tds = row.querySelectorAll("td");
                const cls = tds[1]?.innerText.trim();
                const name = tds[2]?.innerText.trim();

                if (!cls || !name) return;

                const key = cls + "_" + name;

                if (!map[key]) map[key] = [];
                map[key].push(row);
            });

            // 显示重复警告图标
            Object.values(map).forEach(group => {
                if (group.length > 1) {
                    group.forEach(row => {
                        const icon = row.querySelector(".warn-icon");
                        if (icon) {
                            icon.style.display = "inline";
                            icon.dataset.msg = `该学生名下有重复记录 ${group.length} 条`;
                        }
                    });
                }
            });
        }

        /* ===== 工具提示功能 ===== */
        window.addEventListener("load", detectDuplicates);

        let tooltip;

        document.addEventListener("DOMContentLoaded", function() {
            // 创建工具提示元素
            tooltip = document.createElement("div");
            tooltip.className = "tooltip";
            document.body.appendChild(tooltip);

            // 鼠标悬停显示提示
            document.addEventListener("mouseover", function(e) {
                if (e.target.classList.contains("warn-icon")) {
                    const msg = e.target.dataset.msg;
                    if (!msg) return;

                    tooltip.innerText = msg;
                    tooltip.style.display = "block";
                }
            });

            // 鼠标移动更新提示位置
            document.addEventListener("mousemove", function(e) {
                tooltip.style.left = (e.pageX + 10) + "px";
                tooltip.style.top = (e.pageY + 10) + "px";
            });

            // 鼠标离开隐藏提示
            document.addEventListener("mouseout", function(e) {
                if (e.target.classList.contains("warn-icon")) {
                    tooltip.style.display = "none";
                }
            });

            // 手机点击支持
            document.addEventListener("click", function(e) {
                if (e.target.classList.contains("warn-icon")) {
                    const icon = e.target.closest(".warn-icon");
                    if (!icon) return;

                    alert(icon.dataset.msg || "暂无提示");
                }
            });
        });

        /* ===== 表格恢复默认排序 ===== */
        let originalRows = [];

        document.addEventListener("DOMContentLoaded", function() {
            const rows = document.querySelectorAll("table tr");
            originalRows = Array.from(rows).slice(1); // 去掉表头
        });

        function resetTable() {
            const table = document.querySelector("table");

            // 恢复原始行顺序
            originalRows.forEach(row => {
                table.appendChild(row);
            });

            // 清除排序箭头
            const headers = table.querySelectorAll("th");
            headers.forEach(th => {
                th.innerText = th.innerText.replace(/[↑↓]/g, "");
            });

            // 重置筛选
            document.getElementById("filter-class").value = "";
            document.getElementById("filter-name").value = "";
            document.getElementById("filter-song").value = "";
            filterTable();
        }

        /* ===== 绑定筛选事件 ===== */
        document.getElementById("filter-class").addEventListener("change", filterTable);
        document.getElementById("filter-name").addEventListener("change", filterTable);
        document.getElementById("filter-song").addEventListener("change", filterTable);
        initFilters();
    </script>
</body>
</html>
